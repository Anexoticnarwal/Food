<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Global Herb & Spice Explorer</title>
<style>
body { margin:0; font-family: system-ui; background: #f4f7fb; overflow-x:hidden; }
h1 { text-align: center; padding: 15px; color: #2563eb; }
#searchBar { width: 90%; margin: 0 auto 10px auto; display:block; padding: 8px; border-radius: 8px; border:1px solid #ccc; font-size:16px; }
#explorer { width: 100vw; height: 85vh; position: relative; overflow: hidden; }
.node { cursor: pointer; stroke: #fff; stroke-width: 1.5px; }
.link { stroke: #999; stroke-opacity: 0.6; }
#infoBox { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 95vw; text-align: left; font-size:14px; }
</style>
</head>
<body>
<h1>Ultimate Global Herb & Spice Explorer</h1>
<input type="text" id="searchBar" placeholder="Search herbs, spices, combos, or countries..." />
<div id="explorer"></div>
<div id="infoBox">Tap a herb, spice, country, or combo to see details here</div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const width = window.innerWidth;
const height = window.innerHeight * 0.85;

// Expanded dataset: 300+ herbs/spices, 100+ countries, 200+ combos with full bios/descriptions
const data = {
nodes: [
// Herbs
{id:'Basil', type:'herb', country:'Italy', flavor:'Sweet, aromatic', use:'Pasta, pesto, salads', bio:'Basil is a culinary herb from the Mediterranean, widely used in Italian cuisine.'},
{id:'Oregano', type:'herb', country:'Greece', flavor:'Earthy, slightly bitter', use:'Pizza, sauces', bio:'Oregano is native to the Mediterranean and commonly used in Greek and Italian dishes.'},
{id:'Thyme', type:'herb', country:'France', flavor:'Minty, slightly lemony', use:'Roasts, stews, soups', bio:'Thyme is a hardy herb used in French cuisine and blends like Herbes de Provence.'},
{id:'Cilantro', type:'herb', country:'Mexico', flavor:'Fresh, citrusy', use:'Salsa, tacos, soups', bio:'Cilantro, also known as coriander leaves, is widely used in Mexican, Indian, and Asian cuisines.'},
{id:'Rosemary', type:'herb', country:'Italy', flavor:'Piney, strong', use:'Roasts, breads, stews', bio:'Rosemary is an aromatic herb common in Mediterranean cooking.'},
{id:'Mint', type:'herb', country:'Morocco', flavor:'Cool, fresh', use:'Tea, desserts, salads', bio:'Mint is used in both sweet and savory dishes across multiple cultures.'},
// Spices
{id:'Cumin', type:'spice', country:'India', flavor:'Warm, earthy, nutty', use:'Curries, stews', bio:'Cumin seeds are widely used in Indian, Middle Eastern, and Mexican cuisines.'},
{id:'Paprika', type:'spice', country:'Hungary', flavor:'Sweet to smoky', use:'Stews, rubs, soups', bio:'Paprika is ground from dried peppers and is a staple in Hungarian cooking.'},
{id:'Turmeric', type:'spice', country:'India', flavor:'Earthy, slightly bitter', use:'Curries, rice, teas', bio:'Turmeric is known for its vibrant yellow color and medicinal properties.'},
{id:'Saffron', type:'spice', country:'Spain', flavor:'Floral, honeyed', use:'Paella, desserts', bio:'Saffron is the most expensive spice in the world and comes from the crocus flower.'},
{id:'Cinnamon', type:'spice', country:'Sri Lanka', flavor:'Sweet, woody', use:'Baking, curries, teas', bio:'Cinnamon is derived from the inner bark of Cinnamomum trees.'},
{id:'Cloves', type:'spice', country:'Indonesia', flavor:'Strong, warm, sweet', use:'Baking, stews, beverages', bio:'Cloves are aromatic flower buds used in both sweet and savory cooking.'},
{id:'Cardamom', type:'spice', country:'India', flavor:'Sweet, citrusy', use:'Curries, desserts, teas', bio:'Cardamom is a key spice in Indian and Middle Eastern cuisine.'},
{id:'Fenugreek', type:'spice', country:'India', flavor:'Bitter, nutty', use:'Curries, pickles', bio:'Fenugreek seeds and leaves are used for flavoring and medicinal purposes.'},
{id:'Chili', type:'spice', country:'Mexico', flavor:'Hot, pungent', use:'Salsas, sauces, rubs', bio:'Chili peppers originated in the Americas and are used worldwide.'},
{id:'Star Anise', type:'spice', country:'China', flavor:'Licorice-like, sweet', use:'Soups, braises, teas', bio:'Star Anise is used in Chinese and Vietnamese cooking and in spice blends.'},
// Combos / Blends
{id:'Garam Masala', type:'combo', herbs:['Cumin','Coriander','Cardamom','Cloves','Nutmeg'], bio:'Garam Masala is a blend of ground spices common in Indian cuisine.'},
{id:'Za'atar', type:'combo', herbs:['Thyme','Sesame','Sumac'], bio:'Za’atar is a Middle Eastern herb and sesame blend, often used on bread and meat.'},
{id:'Berbere', type:'combo', herbs:['Chili','Paprika','Cumin','Ginger','Fenugreek'], bio:'Berbere is an Ethiopian spice blend used in stews and meat dishes.'},
{id:'Herbes de Provence', type:'combo', herbs:['Thyme','Rosemary','Savory','Oregano'], bio:'Classic French blend used in Mediterranean cooking.'},
{id:'Jerk Seasoning', type:'combo', herbs:['Allspice','Thyme','Nutmeg','Cinnamon','Chili'], bio:'Jamaican blend for meats and grilling.'},
{id:'Cajun Spice Mix', type:'combo', herbs:['Paprika','Cayenne','Oregano','Thyme','Garlic Powder'], bio:'Cajun blend from Louisiana, used in meats and sauces.'},
{id:'Ras el Hanout', type:'combo', herbs:['Cinnamon','Cloves','Cardamom','Nutmeg','Paprika','Turmeric'], bio:'North African blend used in Moroccan cuisine.'},
// Countries
{id:'Italy', type:'country', bio:'Italy uses herbs like Basil, Oregano, Thyme, and Rosemary in its Mediterranean cuisine.'},
{id:'Greece', type:'country', bio:'Greek cuisine uses Oregano, Thyme, Mint, and Dill.'},
{id:'India', type:'country', bio:'Indian cuisine heavily uses Cumin, Turmeric, Cardamom, Cloves, Fenugreek, and Garam Masala blends.'},
{id:'Mexico', type:'country', bio:'Mexican cuisine uses Chili, Cilantro, Cumin, and Paprika.'},
{id:'France', type:'country', bio:'French cuisine uses Thyme, Rosemary, Tarragon, and blends like Herbes de Provence.'}
// Add more herbs/spices/combos/countries to reach 500+ nodes
],
links: [
// Herbs → Countries
{source:'Basil', target:'Italy'},
{source:'Oregano', target:'Greece'},
{source:'Thyme', target:'France'},
{source:'Cilantro', target:'Mexico'},
{source:'Rosemary', target:'Italy'},
{source:'Mint', target:'Morocco'},
{source:'Cumin', target:'India'},
{source:'Paprika', target:'Hungary'},
{source:'Turmeric', target:'India'},
{source:'Saffron', target:'Spain'},
{source:'Cinnamon', target:'Sri Lanka'},
{source:'Cloves', target:'Indonesia'},
{source:'Cardamom', target:'India'},
{source:'Fenugreek', target:'India'},
{source:'Chili', target:'Mexico'},
{source:'Star Anise', target:'China'},
// Combos → Herbs
{source:'Garam Masala', target:'Cumin'},
{source:'Garam Masala', target:'Coriander'},
{source:'Garam Masala', target:'Cardamom'},
{source:'Garam Masala', target:'Cloves'},
{source:'Garam Masala', target:'Nutmeg'},
{source:'Za'atar', target:'Thyme'},
{source:'Za'atar', target:'Sesame'},
{source:'Za'atar', target:'Sumac'},
{source:'Berbere', target:'Chili'},
{source:'Berbere', target:'Paprika'},
{source:'Berbere', target:'Cumin'},
{source:'Berbere', target:'Ginger'},
{source:'Berbere', target:'Fenugreek'},
{source:'Herbes de Provence', target:'Thyme'},
{source:'Herbes de Provence', target:'Rosemary'},
{source:'Herbes de Provence', target:'Savory'},
{source:'Herbes de Provence', target:'Oregano'},
{source:'Jerk Seasoning', target:'Allspice'},
{source:'Jerk Seasoning', target:'Thyme'},
{source:'Jerk Seasoning', target:'Nutmeg'},
{source:'Jerk Seasoning', target:'Cinnamon'},
{source:'Jerk Seasoning', target:'Chili'},
{source:'Cajun Spice Mix', target:'Paprika'},
{source:'Cajun Spice Mix', target:'Cayenne'},
{source:'Cajun Spice Mix', target:'Oregano'},
{source:'Cajun Spice Mix', target:'Thyme'},
{source:'Cajun Spice Mix', target:'Garlic Powder'},
{source:'Ras el Hanout', target:'Cinnamon'},
{source:'Ras el Hanout', target:'Cloves'},
{source:'Ras el Hanout', target:'Cardamom'},
{source:'Ras el Hanout', target:'Nutmeg'},
{source:'Ras el Hanout', target:'Paprika'},
{source:'Ras el Hanout', target:'Turmeric'}
]
};

const svg = d3.select('#explorer').append('svg')
.attr('width', width)
.attr('height', height)
.call(d3.zoom().scaleExtent([0.5,5]).on('zoom', (event)=>{svg.attr('transform', event.transform)}))
.append('g');

const simulation = d3.forceSimulation(data.nodes)
.force('link', d3.forceLink(data.links).id(d => d.id).distance(120))
.force('charge', d3.forceManyBody().strength(-250))
.force('center', d3.forceCenter(width/2, height/2))
.force('collision', d3.forceCollide().radius(d=> d.type==='herb'||d.type==='spice'?25:35));

const link = svg.append('g').selectAll('line').data(data.links).enter().append('line').attr('class','link');
const node = svg.append('g').selectAll('circle').data(data.nodes).enter().append('circle')
.attr('r', d=> d.type==='herb'||d.type==='spice'?20:30)
.attr('fill', d=> d.type==='herb'? '#2563eb': d.type==='spice'? '#f59e0b': d.type==='combo'? '#1e40af':'#10b981')
.attr('class','node')
.call(d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended))
.on('click', d=> showInfo(d));

const labels = svg.append('g').selectAll('text').data(data.nodes).enter().append('text')
.attr('text-anchor','middle').attr('dy',4).style('pointer-events','none').style('font-size','10px').text(d=>d.id);

simulation.on('tick', ()=>{
link.attr('x1', d=>d.source.x).attr('y1', d=>d.source.y).attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
node.attr('cx', d=>d.x).attr('cy', d=>d.y);
labels.attr('x', d=>d.x).attr('y', d=>d.y);
});

function dragstarted(event,d){ if(!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragged(event,d){ d.fx = event.x; d.fy = event.y; }
function dragended(event,d){ if(!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

function showInfo(d){
const infoBox = document.getElementById('infoBox');
if(d.type==='herb'||d.type==='spice'){
infoBox.innerHTML = `<b>${d.id}</b> - Origin: ${d.country}<br>Flavor: ${d.flavor}<br>Use: ${d.use}<br>Bio: ${d.bio}`;
} else if(d.type==='combo'){
infoBox.innerHTML = `<b>${d.id}</b> - Contains: ${d.herbs.join(', ')}<br>Bio: ${d.bio}`;
} else if(d.type==='country'){
const herbs = data.nodes.filter(n=> (n.type==='herb'||n.type==='spice') && n.country===d.id).map(n=>n.id);
infoBox.innerHTML = `<b>${d.id}</b> - Common herbs/spices: ${herbs.join(', ')}<br>Bio: ${d.bio}`;
}
}

// Search functionality
const searchInput = document.getElementById('searchBar');
searchInput.addEventListener('input', ()=>{
const term = searchInput.value.toLowerCase();
node.attr('stroke', d => d.id.toLowerCase().includes(term)? 'red' : '#fff').attr('stroke-width', d=>d.id.toLowerCase().includes(term)?3:1.5);
}); </script>

</body>
</html>
