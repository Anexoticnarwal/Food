<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herb & Spice Explorer PRO v2</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<style>
body{margin:0;font-family:system-ui;background:#f4f7fb;}
h1{text-align:center;color:#2563eb;margin:10px 0;}

nav{
display:flex;justify-content:center;gap:10px;padding:10px;
}

nav button{
padding:10px 16px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer;
}

.page{display:none;padding:10px;}
.page.active{display:block;}

#graph{height:80vh;}
#map{height:80vh;}

#ingredientList{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:10px;
}

.card{
padding:10px;background:white;border-radius:10px;cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

#infoBox{
position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
background:white;padding:12px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<h1>🌿 Herb & Spice Explorer PRO</h1>

<nav>
<button onclick="showPage('searchPage')">Search</button>
<button onclick="showPage('mapPage')">Map</button>
<button onclick="showPage('vizPage')">Visualizer</button>
</nav>

<div id="searchPage" class="page active">
<input id="search" placeholder="Search ingredients..." style="width:100%;padding:10px;margin-bottom:10px;"/>
<div id="ingredientList"></div>
</div>

<div id="mapPage" class="page">
<div id="map"></div>
</div>

<div id="vizPage" class="page">
<div id="graph"></div>
</div>

<div id="infoBox">Tap anything 🌿</div>

<script>

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// ===== DATA =====
const spices = [
{id:'Basil',type:'herb',country:'Italy',pair:['Tomato','Garlic']},
{id:'Tomato',type:'ingredient',country:'Global',pair:['Basil']},
{id:'Garlic',type:'ingredient',country:'Global',pair:['Basil']},
{id:'Cumin',type:'spice',country:'India',pair:['Lentils']},
{id:'Paprika',type:'spice',country:'Hungary',pair:['Chicken']},
{id:'Mint',type:'herb',country:'Morocco',pair:['Lamb']},
{id:'Rosemary',type:'herb',country:'Italy',pair:['Lamb']},
{id:'Lamb',type:'ingredient',country:'Global',pair:['Mint','Rosemary']}
];

// ===== SEARCH PAGE =====
const list = document.getElementById('ingredientList');

function renderList(filter=''){
list.innerHTML='';
spices
.filter(s=>s.id.toLowerCase().includes(filter))
.forEach(s=>{
const div=document.createElement('div');
div.className='card';
div.innerText=s.id;
div.onclick=()=>showInfo(s);
list.appendChild(div);
});
}
renderList();

document.getElementById('search').addEventListener('input',e=>{
renderList(e.target.value.toLowerCase());
});

// ===== VISUALIZER =====
const svg = d3.select('#graph').append('svg').attr('width','100%').attr('height','100%');
const g = svg.append('g');

let links=[];

const sim = d3.forceSimulation(spices)
.force('charge', d3.forceManyBody().strength(-120))
.force('center', d3.forceCenter(window.innerWidth/2,300))
.force('link', d3.forceLink(links).id(d=>d.id).distance(80))
.force('collision', d3.forceCollide().radius(25));

const link = g.append('g').selectAll('line');

const nodes = g.selectAll('circle')
.data(spices)
.enter().append('circle')
.attr('r',15)
.attr('fill',d=> d.type==='herb'?'green': d.type==='spice'?'red':'#888')
.on('click', nodeClick);

const labels = g.selectAll('text')
.data(spices)
.enter().append('text')
.text(d=>d.id)
.attr('font-size',10)
.attr('text-anchor','middle');

sim.on('tick',()=>{
nodes.attr('cx',d=>d.x).attr('cy',d=>d.y);
labels.attr('x',d=>d.x).attr('y',d=>d.y);
g.selectAll('line')
.data(links)
.join('line')
.attr('x1',d=>d.source.x)
.attr('y1',d=>d.source.y)
.attr('x2',d=>d.target.x)
.attr('y2',d=>d.target.y)
.attr('stroke','#999');
});

function nodeClick(e,d){
const pairs = spices.filter(s=>d.pair.includes(s.id));

pairs.forEach(p=>{
links.push({source:d.id,target:p.id});
});

sim.force('link').links(links);
sim.alpha(1).restart();

showInfo(d);
}

// ===== MAP =====
const mapSvg = d3.select('#map').append('svg').attr('width','100%').attr('height','100%');
const projection = d3.geoNaturalEarth1().scale(160).translate([300,250]);
const path = d3.geoPath().projection(projection);

d3.json('https://unpkg.com/world-atlas@2/countries-110m.json').then(data=>{
const countries = topojson.feature(data,data.objects.countries);
mapSvg.selectAll('path')
.data(countries.features)
.enter().append('path')
.attr('d',path)
.attr('fill','#ddd')
.on('click',(e,d)=>{
const name=d.properties.name;
const found=spices.filter(s=>s.country===name);
showText(name+': '+(found.map(f=>f.id).join(', ')||'No data'));
});
});

// ===== INFO =====
function showInfo(d){
document.getElementById('infoBox').innerHTML=`<b>${d.id}</b><br>Pairs: ${d.pair.join(', ')}`;
}

function showText(t){
document.getElementById('infoBox').innerHTML=t;
}

</script>
</body>
</html>
